<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>photosynth-io</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #0a0f0a;
        font-family: system-ui, -apple-system, sans-serif;
        color: #d8f0d8;
      }
      #game {
        display: block;
        width: 100vw;
        height: 100vh;
      }
      #hud {
        position: fixed;
        top: 12px;
        left: 12px;
        font-size: 14px;
        pointer-events: none;
        text-shadow: 0 1px 2px rgba(0,0,0,0.6);
      }
      #effects {
        position: fixed;
        top: 36px;
        left: 12px;
        display: flex;
        gap: 6px;
        pointer-events: none;
      }
      .effect-chip {
        background: rgba(20,30,20,0.85);
        border: 1px solid rgba(159,255,159,0.4);
        border-radius: 6px;
        padding: 4px 8px;
        font-size: 12px;
        text-shadow: 0 1px 2px rgba(0,0,0,0.6);
      }
      #leaderboard {
        position: fixed;
        top: 12px;
        right: 12px;
        background: rgba(20,30,20,0.6);
        border: 1px solid rgba(159,255,159,0.2);
        border-radius: 6px;
        padding: 8px 12px;
        font-size: 13px;
        min-width: 160px;
        pointer-events: none;
        backdrop-filter: blur(4px);
      }
      #leaderboard h3 {
        margin: 0 0 6px;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: #9fff9f;
        opacity: 0.7;
      }
      #leaderboard ol {
        margin: 0;
        padding-left: 22px;
      }
      #leaderboard li {
        line-height: 1.5;
      }
      #leaderboard li.you {
        color: #9fff9f;
        font-weight: 600;
      }
      #controls {
        position: fixed;
        bottom: 12px;
        left: 12px;
        font-size: 12px;
        opacity: 0.6;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>
    <div id="hud">photosynth-io · scaffold ready</div>
    <div id="effects"></div>
    <div id="leaderboard">
      <h3>Leaderboard</h3>
      <ol id="leaders"></ol>
    </div>
    <div id="controls">mouse · space split · stand still grow · move burn</div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
